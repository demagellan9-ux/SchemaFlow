<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #eef1f7;
    --card: #ffffff;
    --header: #0f172a;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --accent: #2563eb;
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --shadow: 0 1px 3px rgba(0,0,0,.07), 0 6px 20px rgba(0,0,0,.06);
    --radius: 14px;
    --font: 'DM Sans', sans-serif;
    --fdisp: 'Syne', sans-serif;
    --fmono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── UTILITY ───────────────────────────────────────────── */
  .hidden { display: none !important; }
  .mono   { font-family: var(--fmono) !important; font-size: .85rem; }

  /* ── TOPBAR ────────────────────────────────────────────── */
  .topbar {
    background: #0f172a;
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 0 rgba(255,255,255,.06);
  }

  .logo {
    font-family: var(--fdisp);
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .sys-title {
    font-size: .82rem;
    color: #94a3b8;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .user-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .uname  { font-size: .88rem; font-weight: 600; color: #f1f5f9; }
  .uemail { font-size: .78rem; color: #94a3b8; }

  .perm-pill {
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    padding: 3px 8px;
    border-radius: 20px;
    background: #1e293b;
    color: #94a3b8;
  }
  .perm-pill.admin    { background: #7c3aed; color: #fff; }
  .perm-pill.manager  { background: #0891b2; color: #fff; }
  .perm-pill.employee { background: #059669; color: #fff; }

  .logout-btn {
    background: transparent;
    border: none;
    color: #e2e8f0;
    cursor: pointer;
    font-size: .85rem;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 6px;
    transition: background .15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .logout-btn:hover { background: rgba(255,255,255,.1); }

  /* ── CONTAINER ─────────────────────────────────────────── */
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── TOAST ─────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    color: #f1f5f9;
    padding: 10px 22px;
    border-radius: 24px;
    font-size: .83rem;
    font-weight: 500;
    box-shadow: 0 4px 24px rgba(0,0,0,.25);
    z-index: 9999;
    max-width: 90vw;
    text-align: center;
    pointer-events: none;
    animation: toastIn .2s ease;
  }
  .toast.error   { background: #dc2626; }
  .toast.success { background: #059669; }
  .toast.warning { background: #d97706; }

  @keyframes toastIn {
    from { opacity:0; transform: translateX(-50%) translateY(8px); }
    to   { opacity:1; transform: translateX(-50%) translateY(0); }
  }

  /* ── CARD ───────────────────────────────────────────────── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    border: 1px solid var(--border);
    text-align: left;
  }

  .card-title {
    font-family: var(--fdisp);
    font-size: 1rem;
    font-weight: 700;
    color: var(--header);
    margin-bottom: 14px;
  }

  /* Loading card */
  #loadingScreen { text-align: center; padding: 32px 20px; }
  .spin {
    font-size: 2rem;
    display: inline-block;
    animation: spin 1.2s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Session error card */
  #sessionErrorScreen { text-align: center; padding: 32px 20px; }
  .err-icon { font-size: 2.2rem; margin-bottom: 10px; }
  .err-msg  { font-size: 1rem; font-weight: 700; margin-bottom: 4px; color: var(--danger); }
  .err-sub  { font-size: .83rem; color: var(--muted); }

  /* ── STATUS BAR ─────────────────────────────────────────── */
  .status-bar {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background .3s, box-shadow .3s;
  }
  .dot-off     { background: #94a3b8; }
  .dot-working { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
  .dot-break   { background: #a855f7; box-shadow: 0 0 0 3px rgba(168,85,247,.2); }
  .dot-lunch   { background: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,.2); }

  #statusText  { font-weight: 600; font-size: .9rem; }
  #statusSince { font-size: .8rem; color: var(--muted); }
  #statusTimer {
    margin-left: auto;
    font-family: var(--fmono);
    font-size: .9rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: .04em;
  }

  /* ── SHIFT META ─────────────────────────────────────────── */
  .shift-meta {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px 16px;
    margin-bottom: 16px;
  }

  .meta-label {
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .meta-value { font-size: .9rem; font-weight: 600; }
  .mv-working  { color: #22c55e; }
  .mv-break    { color: #a855f7; }
  .mv-lunch    { color: #f97316; }
  .mv-off_shift { color: var(--muted); }

  /* ── CONTROLS GRID ──────────────────────────────────────── */
  .ctrl-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .ctrl-label {
    font-size: .8rem;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .btn-pair { display: flex; gap: 6px; }

  /* ── BUTTONS ────────────────────────────────────────────── */
  .btn {
    padding: 9px 14px;
    border: none;
    border-radius: 8px;
    font-family: var(--font);
    font-size: .88rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }

  .btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
  .btn:disabled { opacity: .38; cursor: not-allowed; transform: none; }

  .btn.loading::after {
    content: '';
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin .5s linear infinite;
    margin-left: 6px;
    vertical-align: -2px;
  }

  .btn-start { background: #22c55e; color: #fff; width: 100%; font-size: .95rem; padding: 12px; }
  .btn-end   { background: #dc2626; color: #fff; width: 100%; margin-top: 10px; }
  .btn-break { background: #a855f7; color: #fff; flex: 1; }
  .btn-lunch { background: #f97316; color: #fff; flex: 1; }
  .btn-ghost { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); flex: 1; }
  .btn-task  { background: var(--accent); color: #fff; flex-shrink: 0; }

  /* ── TASK ROW ───────────────────────────────────────────── */
  .task-row { display: flex; gap: 8px; align-items: flex-end; }

  .field-group { flex: 1; }
  .field-group label {
    display: block;
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .field-group input {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: var(--font);
    font-size: .88rem;
    color: var(--text);
    background: #f8fafc;
    transition: border-color .15s;
  }
  .field-group input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  }

  /* ── ACTIVITY TABLE ─────────────────────────────────────── */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table { width: 100%; border-collapse: collapse; font-size: .83rem; }

  thead th {
    text-align: left;
    padding: 8px 10px;
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  tbody td {
    padding: 10px;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }

  .empty-row { text-align: center; color: var(--muted); font-style: italic; padding: 20px; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: .72rem;
    font-weight: 700;
    text-transform: capitalize;
    background: #e2e8f0;
    color: #334155;
  }
  .badge-active { background: #dcfce7; color: #166534; }

  /* ── SUMMARY GRID ───────────────────────────────────────── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 14px;
  }

  .s-label {
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .s-value    { font-size: .95rem; font-weight: 600; }
  .s-value.hl { color: var(--success); font-size: 1.1rem; }

  /* ── RESPONSIVE ─────────────────────────────────────────── */
  @media (max-width: 520px) {
    .ctrl-grid    { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .uemail       { display: none; }
    .sys-title    { display: none; }
    .btn-pair     { flex-direction: column; }
    .btn-pair .btn { flex: none; }
  }
</style>
